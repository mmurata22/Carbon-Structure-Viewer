<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>
  <title>View in AR</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f0f0;
      gap: 10px;
    }
    model-viewer {
        width:100vw;
        height: 100vh;
    }
   model-viewer::part(ar-button) {
    position: absolute;
    top: 50%;
    left: 50%;

    background-color: #FF2400;
    color: white;
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 18px;
    }
  </style>
</head>
<body>
    <model-viewer
        src="Carbon Structure Viewer.glb"
        ios-src="Carbon Structure Viewer.usdz"
        ar
        ar-modes="web-ar scene-viewer quick-look"
        camera-controls
        auto-rotate>

    <button slot="ar-button">View in AR</button>

    <script>
      const modelViewer = document.querySelector("model-viewer");

      const btn100 = document.querySelector('button[slot="hotspot-100"]');
      const btn110 = document.querySelector('button[slot="hotspot-110"]');
      const btn111 = document.querySelector('button[slot="hotspot-111"]');

      const switchZone = (activeName) => {
        if (!modelViewer.model) return;
        const names = ['100-Button', '110-Button', '111-Button'];
        
        names.forEach(name => {
          const node = modelViewer.model.nodes.find(n => n.name === name);
          if (node) {
            node.isVisible = (name === activeName);
          }
        });
      };

      btn100.addEventListener('click', () => switchZone('100-Button'));
      btn110.addEventListener('click', () => switchZone('110-Button'));
      btn111.addEventListener('click', () => switchZone('111-Button'));
    </script>

  </model-viewer>
</body>
</html>
